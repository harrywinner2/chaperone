name = "chaperone"
compatibility_date = "2024-01-01"

# Pages configuration with assets
pages_build_output_dir = "."

# Assets configuration - serve static files from the root directory
[assets]
directory = "."

# This configuration serves your static HTML files and uses the /functions directory for serverless functions

[env.production]
# Environment variables are set in Cloudflare Pages dashboard
# Go to: Pages project > Settings > Environment variables
# Add: AIRTABLE_BASE_ID and AIRTABLE_API_KEY

[env.preview]
# Same environment variables for preview deployments